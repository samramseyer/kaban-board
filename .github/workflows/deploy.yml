name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify production build
        run: |
          if grep -q '/src/main.tsx' dist/app.html; then
            echo "Build failed: dist still references source files"
            exit 1
          fi
          test -f dist/.nojekyll

      - name: Publish build to repository root
        run: |
          cp dist/app.html index.html
          cp dist/app.html 404.html
          rsync -a --delete dist/assets/ assets/

      - name: Commit and push production files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html assets/
          git diff --staged --quiet && echo "No production changes to deploy" && exit 0
          git commit -m "deploy: update GitHub Pages production build [skip ci]"
          git push
